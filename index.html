<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>point.</title>
  <style>
    :root{
      --bg:#FAFAF8;
      --card:#FFFFFF;
      --text:#111827;
      --muted:#6B7280;

      --rasp:#C1124A;     /* planned/done */
      --yellow:#FBBF24;   /* extra */
      --gray:#D1D5DB;     /* empty */
      --rest:#E9E7E3;     /* rest */
      --line:#E5E7EB;

      --todayRing: rgba(17,24,39,.22);
      --ghost:#F3F4F6;
      --dangerBg:#FEF2F2;
      --dangerText:#991B1B;
      --sheetBackdrop:rgba(17,24,39,.35);
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0B0F16;
        --card:#121826;
        --text:#E5E7EB;
        --muted:#9CA3AF;

        --gray:#374151;     /* empty */
        --rest:#1F2937;     /* rest */

        --line:#1F2937;
        --todayRing: rgba(229,231,235,.35);

        --ghost:#1F2937;
        --dangerBg: rgba(254,242,242,.10);
        --dangerText:#FCA5A5;
        --sheetBackdrop:rgba(0,0,0,.55);
      }
      select,input{ background:#0F172A; color:var(--text); border-color:var(--line); }
    }

    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);margin:0;color:var(--text)}
    .wrap{max-width:420px;margin:0 auto;padding:18px}
    h1{margin:8px 0 2px;font-size:26px;letter-spacing:-.2px}
    .sub{color:var(--muted);margin:0 0 14px;font-size:13px}

    .card{background:var(--card);border-radius:16px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:12px}
    .row{display:flex;gap:10px;align-items:center;justify-content:space-between}
    .muted{color:var(--muted);font-size:12px}
    .title{font-weight:800}
    .big{font-size:16px;font-weight:900;letter-spacing:-.2px}
    .kicker{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .spacer8{height:8px}
    .spacer10{height:10px}
    .spacer12{height:12px}

    .week{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:10px}
    .day{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
    .lab{font-size:11px;color:var(--muted)}
    .lab.todayLab{color:var(--text);font-weight:800}

    .dot{width:18px;height:18px;border-radius:999px;background:var(--gray)}
    .planned{border:2px solid var(--rasp);background:transparent}
    .done{background:var(--rasp)}
    .extra{background:var(--yellow)}
    .rest{background:var(--rest)}
    /* today ring: works in light & dark */
    .today{outline:2px solid var(--todayRing);outline-offset:4px;border-radius:999px}

    .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .pill{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
    .mini{width:10px;height:10px;border-radius:999px;background:var(--gray)}
    .mini.planned{border:2px solid var(--rasp);background:transparent;width:10px;height:10px}

    button{border:none;border-radius:12px;padding:11px 12px;font-weight:900;cursor:pointer}
    .primary{background:var(--rasp);color:#fff}
    .ghost{background:var(--ghost);color:var(--text)}
    .warn{background:#111827;color:#fff}
    @media (prefers-color-scheme: dark){
      .warn{background:#0B0F16;color:#fff;border:1px solid var(--line)}
    }
    .danger{background:var(--dangerBg);color:var(--dangerText)}
    .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .btnrow button{flex:1}

    /* Today card bits */
    .todayHeader{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .todayLeft{min-width:0}
    .todayMeta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:6px}
    .badge{
      display:inline-flex;align-items:center;gap:8px;
      padding:7px 10px;border-radius:999px;background:var(--ghost);
      font-size:12px;color:var(--text);font-weight:900;
    }
    .emoji{font-size:16px;line-height:1}
    .hint{color:var(--muted);font-size:12px;margin-top:8px}

    /* Modal */
    .backdrop{
      position:fixed; inset:0;
      background:var(--sheetBackdrop);
      display:none; align-items:flex-end; justify-content:center;
      padding:14px;
    }
    .sheet{
      width:100%;
      max-width:420px;
      background:var(--card);
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      padding:14px;
    }
    .handle{
      width:44px;height:5px;border-radius:999px;background:var(--line);margin:4px auto 10px;
    }
    .hr{height:1px;background:var(--line);margin:12px 0}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    select,input{
      width:100%;
      padding:10px;
      border-radius:12px;
      border:1px solid var(--line);
      font-size:14px;
      background:#fff;
    }
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .chip{
      display:inline-flex;align-items:center;gap:8px;
      padding:8px 10px;border-radius:999px;background:var(--ghost);
      font-size:12px;color:var(--text);font-weight:900;
    }

    .closeX{
      width:40px;height:40px;border-radius:999px;
      display:grid;place-items:center;
      background:var(--ghost);color:var(--text);
      font-size:18px;font-weight:900;
      padding:0;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>point<span style="color:var(--rasp)">.</span></h1>
    <p class="sub">Tap day → details. Planned → done (+5€). Adhoc → extra (0€).</p>

    <!-- TODAY CARD (NEW) -->
    <div class="card" id="todayCard">
      <div id="todayInner"></div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <div class="title">This week</div>
          <div class="muted" id="range"></div>
        </div>
        <div class="chip" id="streakChip">streak: 0/7</div>
      </div>

      <div class="week" id="week"></div>

      <div class="legend">
        <div class="pill"><span class="mini planned"></span>planned</div>
        <div class="pill"><span class="mini" style="background:var(--rasp)"></span>done</div>
        <div class="pill"><span class="mini" style="background:var(--yellow)"></span>extra</div>
        <div class="pill"><span class="mini" style="background:var(--rest)"></span>rest</div>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <div class="title">Watch fund</div>
          <div class="muted">+5€ only for planned → done</div>
        </div>
        <div style="font-weight:900;font-size:18px" id="fund">0€</div>
      </div>
      <div class="muted" style="margin-top:8px" id="fundNote"></div>
    </div>
  </div>

  <!-- Day Sheet -->
  <div class="backdrop" id="backdrop" onclick="closeSheet(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="handle"></div>

      <div class="row">
        <div>
          <div class="title" id="sheetTitle">Day</div>
          <div class="muted" id="sheetSub">status</div>
        </div>
        <button class="closeX" onclick="hideSheet()" aria-label="Close">×</button>
      </div>

      <div class="hr"></div>

      <div id="sheetBody"></div>
    </div>
  </div>

<script>
  // Storage keys
  const LOGS_KEY = "point.logs.v2";
  const FUND_KEY = "point.fund.v1";

  // Helpers
  function iso(d){
    const x = new Date(d); x.setHours(0,0,0,0);
    return x.toISOString().slice(0,10);
  }
  function addDays(d,n){
    const x=new Date(d); x.setDate(x.getDate()+n); return x;
  }
  function startOfWeekMon(d){
    const x=new Date(d); x.setHours(0,0,0,0);
    const day=x.getDay(); // 0 Sun..6 Sat
    const diff=(day===0?-6:1)-day;
    x.setDate(x.getDate()+diff);
    return x;
  }
  function hashStr(s){
    // small deterministic hash
    let h=0;
    for(let i=0;i<s.length;i++){ h=((h<<5)-h)+s.charCodeAt(i); h|=0; }
    return Math.abs(h);
  }
  const labels = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  const sportMeta = {
    run:      { emoji:"🏃‍♀️", name:"Run" },
    swim:     { emoji:"🏊‍♀️", name:"Swim" },
    bike:     { emoji:"🚴‍♀️", name:"Bike" },
    strength: { emoji:"🏋️‍♀️", name:"Strength" },
    mobility: { emoji:"🧘‍♀️", name:"Mobility" },
  };

  // Motivation / rest tips (short, not cringe)
  const motivationGeneric = [
    "One point at a time.",
    "Just show up — the rest follows.",
    "Small win, big momentum.",
    "You’re on point.",
    "Consistency beats intensity."
  ];
  const motivationRun = [
    "Easy day builds the engine.",
    "Run your run — steady wins.",
    "Just a start. That’s the point."
  ];
  const motivationSwim = [
    "Smooth is fast.",
    "One clean length at a time.",
    "Relax + rhythm."
  ];
  const restTips = [
    "Relax in a sauna ♨️",
    "10 min mobility + early sleep 💤",
    "Easy walk + sunlight ☀️",
    "Hot shower + stretch 🧘‍♀️",
    "Legs up the wall for 3–5 min 🧠"
  ];

  function pick(list, key){
    if(!list || list.length===0) return "";
    const idx = hashStr(key) % list.length;
    return list[idx];
  }

  function getMotivationFor(log, dateIso){
    const sport = (log?.sport || "run");
    const key = `${dateIso}:${sport}:${log?.status||"none"}`;
    if(sport==="run") return pick(motivationRun.concat(motivationGeneric), key);
    if(sport==="swim") return pick(motivationSwim.concat(motivationGeneric), key);
    return pick(motivationGeneric, key);
  }

  function getRestTip(dateIso){
    return pick(restTips, `rest:${dateIso}`);
  }

  // State
  let logs = JSON.parse(localStorage.getItem(LOGS_KEY) || "{}");
  let fund = Number(localStorage.getItem(FUND_KEY) || "0");

  const today = new Date();
  const todayIso = iso(today);
  const weekStart = startOfWeekMon(today);
  const days = Array.from({length:7}).map((_,i)=>iso(addDays(weekStart,i)));

  let selectedDate = todayIso;

  function statusFor(date){ return logs[date]?.status || "none"; }
  function logFor(date){ return logs[date] || {date, status:"none"}; }

  function setLog(date, patch){
    const prev = logs[date] || {date, status:"none"};
    logs[date] = {...prev, ...patch, date};
    localStorage.setItem(LOGS_KEY, JSON.stringify(logs));
    render();
    renderSheet(); // keep sheet in sync if open
  }
  function clearDay(date){
    delete logs[date];
    localStorage.setItem(LOGS_KEY, JSON.stringify(logs));
    render();
    renderSheet();
  }

  function addFund(amount, reason){
    fund += amount;
    localStorage.setItem(FUND_KEY, String(fund));
    document.getElementById("fundNote").textContent = reason;
    renderFund();
  }
  function renderFund(){
    document.getElementById("fund").textContent = `${fund}€`;
  }

  function computeStreakMax7(){
    // count done in last 7 days including today
    let s=0;
    for(let i=0;i<7;i++){
      const d=iso(addDays(today,-i));
      if(logs[d]?.status==="done") s++;
    }
    return Math.min(7,s);
  }

  // TODAY card render (NEW)
  function renderTodayCard(){
    const el = document.getElementById("todayInner");
    const st = statusFor(todayIso);
    const log = logFor(todayIso);

    const inWeekIdx = days.indexOf(todayIso);
    const dow = inWeekIdx>=0 ? labels[inWeekIdx] : "Today";

    function metaLine(text){
      return `<div class="hint">${text}</div>`;
    }

    // If no sport yet, show neutral icon
    const sport = log?.sport || "run";
    const sm = sportMeta[sport] || {emoji:"⭐", name:"Training"};

    // Compose summary based on status
    let header = `
      <div class="todayHeader">
        <div class="todayLeft">
          <div class="kicker">Today</div>
          <div class="big">${dow} • ${todayIso}</div>
          <div class="todayMeta">
            <span class="badge"><span class="emoji">${sm.emoji}</span>${sm.name}</span>
            <span class="badge" id="todayStatusBadge"></span>
          </div>
        </div>
        <button class="ghost" onclick="openSheet('${todayIso}')">Details</button>
      </div>
    `;

    let statusBadge = "empty";
    let body = "";
    let actions = "";

    if(st==="planned"){
      statusBadge = "planned";
      const goalTxt = (log.goalType==="time")
        ? `${Number(log.goalValue||0)} min`
        : `${Number(log.goalValue||0)} km`;
      body = `
        <div class="spacer12"></div>
        <div class="title">${log.name || "training"}</div>
        <div class="muted">${log.goalValue ? goalTxt : "no goal set"}</div>
        ${log.note ? `<div class="hint">“${escapeHtml(log.note)}”</div>` : ""}
        ${metaLine(getMotivationFor(log, todayIso))}
      `;
      actions = `
        <div class="btnrow">
          <button class="primary" onclick="quickCompletePlannedToday()">Done (+5€)</button>
          <button class="ghost" onclick="openSheet('${todayIso}')">Move / Edit</button>
        </div>
      `;
    } else if(st==="adhoc_draft"){
      statusBadge = "unplanned";
      const goalTxt = (log.goalType==="time")
        ? `${Number(log.goalValue||0)} min`
        : `${Number(log.goalValue||0)} km`;
      body = `
        <div class="spacer12"></div>
        <div class="title">${log.name || "unplanned training"}</div>
        <div class="muted">${log.goalValue ? goalTxt : "no goal set"}</div>
        ${log.note ? `<div class="hint">“${escapeHtml(log.note)}”</div>` : ""}
        ${metaLine("Nice extra — no pressure, just progress.")}
      `;
      actions = `
        <div class="btnrow">
          <button class="warn" onclick="quickCompleteAdhocToday()">Done (extra)</button>
          <button class="ghost" onclick="openSheet('${todayIso}')">Edit</button>
        </div>
      `;
    } else if(st==="done"){
      statusBadge = "done";
      body = `
        <div class="spacer12"></div>
        <div class="title">${log.name || "training"}</div>
        <div class="muted">Completed. +5€ already counted.</div>
        ${metaLine("Nice. You earned it.")}
      `;
      actions = `
        <div class="btnrow">
          <button class="ghost" onclick="openSheet('${todayIso}')">Edit details</button>
          <button class="ghost" onclick="scrollToWeek()">See week</button>
        </div>
      `;
    } else if(st==="extra"){
      statusBadge = "extra";
      body = `
        <div class="spacer12"></div>
        <div class="title">${log.name || "unplanned training"}</div>
        <div class="muted">Completed. No € reward (extra).</div>
        ${metaLine("Extra points for showing up.")}
      `;
      actions = `
        <div class="btnrow">
          <button class="ghost" onclick="openSheet('${todayIso}')">Edit details</button>
          <button class="ghost" onclick="scrollToWeek()">See week</button>
        </div>
      `;
    } else if(st==="rest"){
      statusBadge = "rest day";
      body = `
        <div class="spacer12"></div>
        <div class="title"><span class="emoji">🧘‍♀️</span> Rest day</div>
        ${metaLine(getRestTip(todayIso))}
      `;
      actions = `
        <div class="btnrow">
          <button class="ghost" onclick="clearDay('${todayIso}')">Unset rest</button>
          <button class="ghost" onclick="openSheet('${todayIso}')">Plan training</button>
        </div>
      `;
    } else {
      statusBadge = "empty";
      body = `
        <div class="spacer12"></div>
        <div class="title">Nothing planned yet</div>
        ${metaLine("Keep it flexible. Plan later — or go unplanned.")}
      `;
      actions = `
        <div class="btnrow">
          <button class="primary" onclick="openSheet('${todayIso}')">Add activity</button>
          <button class="ghost" onclick="scrollToWeek()">See week</button>
        </div>
      `;
    }

    el.innerHTML = header + body + actions;
    const b = document.getElementById("todayStatusBadge");
    if(b) b.textContent = statusBadge;
  }

  function scrollToWeek(){
    // small helper for mobile
    window.scrollTo({top: 220, behavior:"smooth"});
  }

  function escapeHtml(s){
    return String(s || "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  // Quick actions (Today card)
  function quickCompletePlannedToday(){
    const log = logFor(todayIso);
    if(statusFor(todayIso)!=="planned") return;
    setLog(todayIso,{status:"done", ...log});
    addFund(5,"Nice. Planned → done. +5€ to your watch fund.");
  }
  function quickCompleteAdhocToday(){
    const log = logFor(todayIso);
    if(statusFor(todayIso)!=="adhoc_draft") return;
    setLog(todayIso,{status:"extra", ...log});
    document.getElementById("fundNote").textContent = "Unplanned completed. (No € reward)";
  }

  // Main UI render
  function render(){
    document.getElementById("range").textContent = `${days[0]} → ${days[6]}`;
    renderFund();

    const streak = computeStreakMax7();
    document.getElementById("streakChip").textContent = `streak: ${streak}/7`;

    // Today card first
    renderTodayCard();

    const weekEl=document.getElementById("week");
    weekEl.innerHTML="";

    days.forEach((d,i)=>{
      const wrap=document.createElement("div");
      wrap.className="day";
      wrap.onclick=()=>openSheet(d);

      const lab=document.createElement("div");
      lab.className="lab";
      lab.textContent=labels[i];
      if(d===todayIso) lab.classList.add("todayLab");

      const dot=document.createElement("div");
      dot.className="dot";

      const st=statusFor(d);
      if(st==="planned") dot.classList.add("planned");
      if(st==="done") dot.classList.add("done");
      if(st==="extra") dot.classList.add("extra");
      if(st==="rest") dot.classList.add("rest");
      if(d===todayIso) dot.classList.add("today");

      wrap.appendChild(lab);
      wrap.appendChild(dot);
      weekEl.appendChild(wrap);
    });
  }

  // Sheet controls
  function openSheet(date){
    selectedDate = date;
    document.getElementById("backdrop").style.display="flex";
    renderSheet();
  }
  function hideSheet(){
    document.getElementById("backdrop").style.display="none";
  }
  function closeSheet(e){
    if(e.target.id==="backdrop") hideSheet();
  }

  function statusLabel(st){
    if(st==="none") return "empty";
    if(st==="planned") return "planned";
    if(st==="done") return "done";
    if(st==="extra") return "unplanned (extra)";
    if(st==="rest") return "rest day";
    if(st==="adhoc_draft") return "unplanned (draft)";
    return st;
  }

  function renderSheet(){
    const bd = document.getElementById("backdrop");
    if(bd.style.display!=="flex") return;

    const i = days.indexOf(selectedDate);
    const dow = i>=0 ? labels[i] : "Day";
    const st = statusFor(selectedDate);
    const log = logFor(selectedDate);

    document.getElementById("sheetTitle").textContent = `${dow} • ${selectedDate}`;
    document.getElementById("sheetSub").textContent = `status: ${statusLabel(st)}`;

    const body = document.getElementById("sheetBody");
    body.innerHTML = "";

    function fieldRow(html){
      const div=document.createElement("div");
      div.innerHTML = html;
      body.appendChild(div);
    }

    function renderEditForm(defaults){
      fieldRow(`
        <div class="grid2">
          <div>
            <label>Sport</label>
            <select id="fSport">
              <option value="run">Run</option>
              <option value="swim">Swim</option>
              <option value="bike">Bike</option>
              <option value="strength">Strength</option>
              <option value="mobility">Mobility</option>
            </select>
          </div>
          <div>
            <label>Goal type</label>
            <select id="fGoalType">
              <option value="distance">Distance (km)</option>
              <option value="time">Time (min)</option>
            </select>
          </div>
        </div>

        <div style="margin-top:10px">
          <label>Name</label>
          <input id="fName" placeholder="easy 5 km / long run / drills..." />
        </div>

        <div style="margin-top:10px">
          <label id="fGoalLabel">Value</label>
          <input id="fGoalValue" type="number" step="0.1" placeholder="e.g. 5" />
        </div>

        <div style="margin-top:10px">
          <label>Note (optional)</label>
          <input id="fNote" placeholder="mood, cue, anything..." />
        </div>
      `);

      document.getElementById("fSport").value = defaults.sport || "run";
      document.getElementById("fName").value = defaults.name || "";
      document.getElementById("fGoalType").value = defaults.goalType || "distance";
      document.getElementById("fGoalValue").value = (defaults.goalValue ?? "");
      document.getElementById("fNote").value = defaults.note || "";

      const gt = document.getElementById("fGoalType");
      const gl = document.getElementById("fGoalLabel");
      function syncLabel(){
        gl.textContent = gt.value==="time" ? "Minutes" : "Kilometers";
      }
      gt.onchange = syncLabel;
      syncLabel();

      return () => ({
        sport: document.getElementById("fSport").value,
        name: document.getElementById("fName").value.trim() || "training",
        goalType: document.getElementById("fGoalType").value,
        goalValue: Number(document.getElementById("fGoalValue").value || 0),
        note: document.getElementById("fNote").value.trim()
      });
    }

    // ----- STATE: none (empty)
    if(st==="none"){
      fieldRow(`<div class="muted">Nothing here yet.</div>`);
      const get = renderEditForm({sport:"run", goalType:"distance", goalValue:"", name:"", note:""});

      fieldRow(`<div class="btnrow">
        <button class="primary" id="btnPlan">Plan training</button>
        <button class="ghost" id="btnAdhoc">Unplanned training</button>
      </div>
      <div class="btnrow">
        <button class="ghost" id="btnRest">Rest day</button>
        <button class="danger" id="btnClear">Clear</button>
      </div>
      <div class="muted">Unplanned becomes <b>yellow</b> only after you complete it. No €.</div>
      `);

      document.getElementById("btnPlan").onclick = ()=>{
        const v=get();
        setLog(selectedDate,{status:"planned", ...v});
      };
      document.getElementById("btnAdhoc").onclick = ()=>{
        const v=get();
        setLog(selectedDate,{status:"adhoc_draft", ...v});
      };
      document.getElementById("btnRest").onclick = ()=> setLog(selectedDate,{status:"rest"});
      document.getElementById("btnClear").onclick = ()=> clearDay(selectedDate);
      return;
    }

    // ----- STATE: adhoc draft
    if(st==="adhoc_draft"){
      fieldRow(`<div class="chip">unplanned • not completed yet</div>`);
      const get = renderEditForm(log);

      fieldRow(`<div class="btnrow">
        <button class="warn" id="btnComplete">Done (extra)</button>
        <button class="ghost" id="btnSave">Save edits</button>
      </div>
      <div class="btnrow">
        <button class="danger" id="btnClear">Clear</button>
      </div>
      <div class="muted">Completion turns the day <b>yellow</b>. No € reward.</div>
      `);

      document.getElementById("btnComplete").onclick=()=>{
        const v=get();
        setLog(selectedDate,{status:"extra", ...v});
        document.getElementById("fundNote").textContent = "Unplanned completed. (No € reward)";
      };
      document.getElementById("btnSave").onclick=()=>{
        const v=get();
        setLog(selectedDate,{...v});
      };
      document.getElementById("btnClear").onclick=()=>clearDay(selectedDate);
      return;
    }

    // ----- STATE: planned
    if(st==="planned"){
      fieldRow(`<div class="chip">planned training</div>`);
      const get = renderEditForm(log);

      const opts = days.map((d,idx)=>`<option value="${d}" ${d===selectedDate?"selected":""}>${labels[idx]} (${d.slice(5)})</option>`).join("");
      fieldRow(`
        <div style="margin-top:10px">
          <label>Move to</label>
          <select id="moveTo">${opts}</select>
        </div>
      `);

      fieldRow(`<div class="btnrow">
        <button class="primary" id="btnComplete">Done (+5€)</button>
        <button class="ghost" id="btnMove">Move</button>
      </div>
      <div class="btnrow">
        <button class="ghost" id="btnSave">Save edits</button>
        <button class="danger" id="btnCancel">Cancel plan</button>
      </div>
      `);

      document.getElementById("btnComplete").onclick=()=>{
        const v=get();
        setLog(selectedDate,{status:"done", ...v});
        addFund(5,"Nice. Planned → done. +5€ to your watch fund.");
      };
      document.getElementById("btnMove").onclick=()=>{
        const to=document.getElementById("moveTo").value;
        const v=get();
        clearDay(selectedDate);
        setLog(to,{status:"planned", ...v});
        selectedDate = to;
        renderSheet();
      };
      document.getElementById("btnSave").onclick=()=>{
        const v=get();
        setLog(selectedDate,{...v});
      };
      document.getElementById("btnCancel").onclick=()=>clearDay(selectedDate);
      return;
    }

    // ----- STATE: rest
    if(st==="rest"){
      fieldRow(`<div class="chip">rest day</div>`);
      fieldRow(`<div class="muted">${getRestTip(selectedDate)}</div>`);
      const get = renderEditForm({sport:"run", goalType:"distance", goalValue:"", name:"", note:""});

      fieldRow(`<div class="btnrow">
        <button class="ghost" id="btnUnset">Unset rest</button>
        <button class="primary" id="btnPlan">Plan training</button>
      </div>
      <div class="btnrow">
        <button class="danger" id="btnClear">Clear</button>
      </div>
      `);

      document.getElementById("btnUnset").onclick=()=>clearDay(selectedDate);
      document.getElementById("btnPlan").onclick=()=>{
        const v=get();
        setLog(selectedDate,{status:"planned", ...v});
      };
      document.getElementById("btnClear").onclick=()=>clearDay(selectedDate);
      return;
    }

    // ----- STATE: done or extra
    if(st==="done" || st==="extra"){
      fieldRow(`<div class="chip">${st==="done" ? "completed (done)" : "completed (extra)"}</div>`);
      const get = renderEditForm(log);

      fieldRow(`<div class="btnrow">
        <button class="ghost" id="btnSave">Save edits</button>
        <button class="danger" id="btnClear">Clear</button>
      </div>
      <div class="muted">${st==="done" ? "Done is raspberry. Reward already counted." : "Extra is yellow. No € reward."}</div>
      `);

      document.getElementById("btnSave").onclick=()=>{
        const v=get();
        setLog(selectedDate,{...v});
      };
      document.getElementById("btnClear").onclick=()=>clearDay(selectedDate);
      return;
    }

    fieldRow(`<div class="muted">Unknown state.</div>`);
    fieldRow(`<div class="btnrow"><button class="danger" onclick="clearDay(selectedDate)">Clear</button></div>`);
  }

  // Init
  render();
</script>
</body>
</html>
