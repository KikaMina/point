<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>point.</title>

  <style>
    :root{
      --bg:#0B0D10;
      --card:#14171C;
      --card2:#101318;
      --text:#E7EAF0;
      --muted:#A5ADBA;
      --line:rgba(255,255,255,.08);

      --rasp:#C1124A;     /* planned/done */
      --yellow:#FBBF24;   /* extra */
      --gray:#3A3F48;     /* empty */
      --rest:#2A2F38;     /* rest */

      --pill:#1C2027;
      --btn:#232834;
      --btn2:#2B3140;

      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius:18px;
    }

    @media (prefers-color-scheme: light){
      :root{
        --bg:#FAFAF8;
        --card:#FFFFFF;
        --card2:#FFFFFF;
        --text:#111827;
        --muted:#6B7280;
        --line:#E5E7EB;

        --gray:#D1D5DB;
        --rest:#E9E7E3;
        --pill:#F3F4F6;
        --btn:#F3F4F6;
        --btn2:#ECEFF3;

        --shadow: 0 1px 10px rgba(0,0,0,.06);
      }
    }

    *{box-sizing:border-box}
    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      background:var(--bg);
      margin:0;
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .wrap{max-width:440px;margin:0 auto;padding:16px 14px 44px}

    h1{
      margin:8px 0 2px;
      font-size:30px;
      letter-spacing:-.3px;
      line-height:1.05;
      font-weight:950;
    }
    .sub{
      color:var(--muted);
      margin:0 0 14px;
      font-size:13px;
      line-height:1.35
    }

    .toprow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}

    /* Tabs */
    .tabs{ margin:10px 0 14px; }
    .tabbar{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      padding:6px;
      display:flex;
      gap:6px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .tabbtn{
      border:none;
      border-radius:12px;
      padding:10px 10px;
      background:transparent;
      color:var(--muted);
      font-weight:850;
      cursor:pointer;
      flex:1;
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:14px;
    }
    .tabbtn.active{ background:var(--btn); color:var(--text); }

    /* Cards */
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow);
      margin-bottom:12px;
    }

    .row{display:flex;gap:10px;align-items:center;justify-content:space-between}
    .muted{color:var(--muted);font-size:12px}
    .title{ font-weight:950; font-size:18px; letter-spacing:-.2px; }
    .subtitle{
      color:var(--muted);
      font-size:13px;
      margin-top:2px;
      line-height:1.25;
    }
    .hr{height:1px;background:var(--line);margin:12px 0}

    /* Chips / tags (smaller + lighter) */
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:9px 11px;
      border-radius:999px;
      background:var(--pill);
      font-size:13px;
      color:var(--text);
      font-weight:800;
      border:1px solid var(--line);
      white-space:nowrap;
      max-width:100%;
    }
    .chipSmall{
      font-size:12px;
      padding:8px 10px;
      font-weight:850;
    }

    .tagrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

    button{border:none;border-radius:14px;padding:12px 14px;font-weight:900;cursor:pointer}
    .primary{background:var(--rasp);color:#fff}
    .ghost{background:var(--btn);color:var(--text);border:1px solid var(--line)}
    .ghost2{background:transparent;color:var(--text);border:1px solid var(--line)}
    .danger{background:rgba(193,18,74,.12);color:var(--text);border:1px solid rgba(193,18,74,.35)}
    button:disabled{opacity:.45;cursor:not-allowed;filter:saturate(.9)}
    .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btnrow button{flex:1}

    /* TODAY */
    .todayHeader{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .bigName{
      font-size:26px;
      font-weight:980;
      letter-spacing:-.4px;
      margin:10px 0 4px;
      line-height:1.08;
    }
    .bigMeta{font-size:15px;color:var(--muted);margin:0}
    .quote{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      line-height:1.4;
      white-space:pre-line;
    }
    .onpoint{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      line-height:1.4;
    }

    /* Compact metric cards inside today */
    .metricStack{display:flex;flex-direction:column;gap:10px;margin-top:12px}
    .metricCard{
      background:var(--card2);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .metricTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .metricTitle{font-weight:950;font-size:14px;letter-spacing:-.1px}
    .metricRight{font-weight:950;font-size:14px}
    .metricSub{margin-top:4px;color:var(--muted);font-size:12px;line-height:1.25}

    /* Trophy banner */
    .trophy{
      background:rgba(251,191,36,.14);
      border:1px solid rgba(251,191,36,.35);
      border-radius:16px;
      padding:12px;
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:10px;
      font-weight:950;
    }
    .trophyIcon{
      display:inline-flex;
      width:26px;height:26px;
      align-items:center;justify-content:center;
      font-size:18px;
      transform-origin:50% 60%;
      animation:trophyWobble 1.25s ease-in-out infinite;
    }
    @keyframes trophyWobble{
      0%{transform:rotate(0deg) translateY(0)}
      20%{transform:rotate(-6deg) translateY(-1px)}
      50%{transform:rotate(6deg) translateY(-1px)}
      80%{transform:rotate(-4deg) translateY(0)}
      100%{transform:rotate(0deg) translateY(0)}
    }

    /* WEEK */
    .week{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:12px}
    .day{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
    .lab{font-size:12px;color:var(--muted);font-weight:850}
    .dot{ width:18px;height:18px;border-radius:999px;background:var(--gray); position:relative; }
    .planned{border:2px solid var(--rasp);background:transparent}
    .done{background:var(--rasp)}
    .extra{background:var(--yellow)}
    .rest{background:var(--rest)}

    .todayRing{
      outline:2px solid rgba(255,255,255,.18);
      outline-offset:6px;
      border-radius:999px;
    }
    @media (prefers-color-scheme: light){
      .todayRing{outline:2px solid rgba(17,24,39,.22);outline-offset:6px;}
    }
    .todayGlow{box-shadow:none}
    @media (prefers-color-scheme: dark){
      .todayGlow{box-shadow: 0 0 0 7px rgba(193,18,74,.10);}
    }

    .legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .pill{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-weight:800}
    .mini{width:10px;height:10px;border-radius:999px;background:var(--gray)}
    .mini.planned{border:2px solid var(--rasp);background:transparent}

    /* CALENDAR (new clean cells) */
    .calHeader{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
    .calTitle{font-weight:980;font-size:22px;letter-spacing:-.2px;text-transform:lowercase}
    .calNav{display
