<!doctype html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>point.</title>
  <style>
    :root{
      --bg: #f6f6f7;
      --panel: rgba(255,255,255,.85);
      --card: rgba(255,255,255,.92);
      --ink: #0f172a;
      --muted: rgba(15, 23, 42, .65);
      --muted2: rgba(15, 23, 42, .45);
      --border: rgba(15, 23, 42, .10);
      --shadow: 0 10px 30px rgba(15, 23, 42, .10);
      --shadow2: 0 6px 18px rgba(15, 23, 42, .08);
      --radius: 26px;
      --radius2: 18px;

      --accent: #a5163a;          /* point wine */
      --accent2: #f3d8df;         /* soft */
      --chip: rgba(15, 23, 42, .06);
      --chipBorder: rgba(15, 23, 42, .10);

      --planFill: rgba(165, 22, 58, .10);
      --doneFill: rgba(165, 22, 58, .18);
      --extraFill: rgba(244, 180, 0, .18);
      --restFill: rgba(15, 23, 42, .06);

      --trophyFill: rgba(244, 180, 0, .14);
      --trophyBorder: rgba(244, 180, 0, .30);

      --danger: #b91c1c;
      --dangerFill: rgba(185, 28, 28, .10);

      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    [data-theme="dark"]{
      --bg: #0b0b0d;
      --panel: rgba(255,255,255,.06);
      --card: rgba(255,255,255,.07);
      --ink: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.66);
      --muted2: rgba(255,255,255,.48);
      --border: rgba(255,255,255,.10);
      --shadow: 0 14px 40px rgba(0,0,0,.45);
      --shadow2: 0 10px 26px rgba(0,0,0,.40);

      --chip: rgba(255,255,255,.08);
      --chipBorder: rgba(255,255,255,.12);

      --planFill: rgba(165, 22, 58, .20);
      --doneFill: rgba(165, 22, 58, .28);
      --extraFill: rgba(244, 180, 0, .22);
      --restFill: rgba(255,255,255,.06);

      --trophyFill: rgba(244, 180, 0, .18);
      --trophyBorder: rgba(244, 180, 0, .32);

      --dangerFill: rgba(185, 28, 28, .16);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      background: radial-gradient(1200px 800px at 10% 0%, rgba(165,22,58,.10), transparent 50%),
                  radial-gradient(1200px 900px at 90% 15%, rgba(244,180,0,.10), transparent 55%),
                  var(--bg);
      color: var(--ink);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap{
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 14px 44px;
    }

    /* Header */
    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding: 10px 6px 8px;
    }
    .brand h1{
      margin:0;
      letter-spacing:-0.02em;
      font-size: 44px;
      line-height: 1;
      font-weight: 800;
    }
    .brand h1 .dot{ color: var(--accent); }
    .brand p{
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
      max-width: 560px;
    }

    .tools{
      display:flex;
      align-items:center;
      gap:10px;
      padding-top: 10px;
    }
    .iconBtn{
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow2);
      display:grid;
      place-items:center;
      cursor:pointer;
      user-select:none;
      color: var(--ink);
    }
    .iconBtn:active{ transform: translateY(1px); }

    /* Tabs */
    .tabs{
      margin-top: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow2);
      border-radius: 22px;
      padding: 10px;
      display:flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar{ display:none; }

    .tab{
      flex: 1 0 auto;
      min-width: 132px;
      border-radius: 16px;
      border: 1px solid transparent;
      background: transparent;
      padding: 10px 12px;
      font-weight: 700;
      color: var(--muted);
      cursor:pointer;
      text-align:center;
      font-size: 15px;
      line-height: 1;
      white-space: nowrap;
    }
    .tab.active{
      background: var(--card);
      border-color: var(--border);
      color: var(--ink);
      box-shadow: var(--shadow2);
    }

    /* Layout blocks */
    .panel{
      margin-top: 14px;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .card{
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow2);
    }

    .sectionTitle{
      margin: 2px 0 10px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.01em;
    }
    .sectionSub{
      margin: -6px 0 12px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    /* Chips */
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }
    .chips{ display:flex; gap:10px; flex-wrap:wrap; }
    .chip{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      border: 1px solid var(--chipBorder);
      background: var(--chip);
      padding: 9px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      line-height: 1;
      color: var(--ink);
      max-width: 100%;
    }
    .chip .muted{ color: var(--muted); font-weight: 700; }
    .chip.small{ padding: 8px 10px; font-size: 13px; }
    .chip.pill{ background: var(--card); border-color: var(--border); box-shadow: var(--shadow2); }
    .chip.plan{ background: var(--planFill); border-color: rgba(165,22,58,.20); }
    .chip.done{ background: var(--doneFill); border-color: rgba(165,22,58,.28); }
    .chip.extra{ background: var(--extraFill); border-color: rgba(244,180,0,.28); }

    /* Buttons */
    .btnRow{ display:flex; gap:12px; margin-top: 14px; flex-wrap:wrap; }
    .btn{
      flex: 1 1 180px;
      padding: 13px 14px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--ink);
      font-weight: 800;
      cursor:pointer;
      box-shadow: var(--shadow2);
      font-size: 15px;
    }
    .btn.primary{
      background: var(--accent);
      border-color: rgba(165,22,58,.28);
      color: #fff;
      box-shadow: 0 12px 26px rgba(165,22,58,.25);
    }
    .btn.ghost{
      background: transparent;
      border-color: var(--border);
    }
    .btn.danger{
      background: var(--dangerFill);
      border-color: rgba(185,28,28,.28);
      color: var(--danger);
    }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      box-shadow:none;
    }
    .btn:active:not(:disabled){ transform: translateY(1px); }

    /* Today card typography */
    .todayHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .todayLabel{
      letter-spacing: .18em;
      text-transform: uppercase;
      font-size: 12px;
      color: var(--muted2);
      font-weight: 800;
      margin-bottom: 2px;
    }
    .todayDate{
      font-size: 40px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin: 0;
    }
    .todayMeta{
      margin-top: 10px;
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap:wrap;
    }

    .hr{
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    .activityTitle{
      margin: 6px 0 2px;
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }
    .activitySub{
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
    }
    .activityText{
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }
    .mantra{
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }

    /* Stat cards */
    .stats{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 12px;
    }
    .stat{
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 20px;
      padding: 14px 14px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      box-shadow: var(--shadow2);
    }
    .stat .k{
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -0.01em;
      margin: 0 0 4px;
    }
    .stat .v{
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
      font-weight: 700;
    }
    .stat .right{
      text-align:right;
      min-width: 100px;
    }
    .stat .big{
      font-weight: 900;
      font-size: 18px;
      margin: 0 0 4px;
      letter-spacing:-0.01em;
    }
    .stat .small{
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    /* Week row */
    .weekCard{
      margin-top: 14px;
    }
    .weekHead{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .weekTitle{
      margin: 0;
      font-weight: 900;
      font-size: 28px;
      letter-spacing:-0.02em;
    }
    .weekRange{
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }
    .weekDots{
      display:flex;
      gap: 12px;
      margin-top: 10px;
      align-items:center;
    }
    .wd{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 8px;
      width: 40px;
    }
    .wd .lbl{
      font-weight: 800;
      color: var(--muted);
      font-size: 13px;
    }
    .dot{
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: 2px solid rgba(165,22,58,.45);
      background: transparent;
      box-shadow: none;
    }
    .dot.done{ background: rgba(165,22,58,.95); border-color: rgba(165,22,58,.95); }
    .dot.plan{ background: transparent; border-color: rgba(165,22,58,.50); }
    .dot.extra{ background: rgba(244,180,0,.95); border-color: rgba(244,180,0,.95); }
    .dot.rest{ background: rgba(15,23,42,.18); border-color: rgba(15,23,42,.18); }
    [data-theme="dark"] .dot.rest{ background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.12); }

    .legend{
      display:flex;
      gap: 14px;
      flex-wrap:wrap;
      margin-top: 10px;
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
      align-items:center;
    }
    .legendItem{ display:flex; align-items:center; gap:8px; }
    .legendSw{
      width: 12px; height: 12px; border-radius: 999px;
      border: 2px solid rgba(165,22,58,.45);
      background: transparent;
    }
    .legendSw.done{ background: rgba(165,22,58,.95); border-color: rgba(165,22,58,.95); }
    .legendSw.plan{ background: transparent; border-color: rgba(165,22,58,.50); }
    .legendSw.extra{ background: rgba(244,180,0,.95); border-color: rgba(244,180,0,.95); }
    .legendSw.rest{ background: rgba(15,23,42,.18); border-color: rgba(15,23,42,.18); }
    [data-theme="dark"] .legendSw.rest{ background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.12); }

    /* Trophy */
    .trophy{
      border: 1px solid var(--trophyBorder);
      background: var(--trophyFill);
      border-radius: 18px;
      padding: 12px 14px;
      display:flex;
      align-items:center;
      gap: 12px;
      font-weight: 900;
      letter-spacing: -0.01em;
      margin-top: 10px;
      box-shadow: var(--shadow2);
    }
    .trophy .cup{
      font-size: 22px;
      display:inline-block;
      transform-origin: center;
    }
    .trophy .txt{ font-size: 16px; }
    .trophy.bounce .cup{
      animation: cup-bounce 900ms ease-in-out 1;
    }
    @keyframes cup-bounce{
      0%{ transform: translateY(0) rotate(0deg); }
      22%{ transform: translateY(-6px) rotate(-5deg); }
      50%{ transform: translateY(0) rotate(3deg); }
      75%{ transform: translateY(-3px) rotate(-2deg); }
      100%{ transform: translateY(0) rotate(0deg); }
    }

    /* Calendar */
    .calHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .calTitle{
      margin: 0;
      font-weight: 900;
      font-size: 34px;
      letter-spacing:-0.02em;
      text-transform: lowercase;
    }
    .calNav{
      display:flex;
      gap:10px;
    }
    .calBtn{
      width: 44px;
      height: 44px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: var(--shadow2);
      cursor:pointer;
      color: var(--ink);
      font-weight: 900;
      font-size: 18px;
    }
    .calBtn:active{ transform: translateY(1px); }

    .dow{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      margin-bottom: 10px;
      padding: 0 2px;
    }
    .dow div{
      text-align:center;
      color: var(--muted);
      font-weight: 900;
      font-size: 14px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 12px;
    }
    .cell{
      border: 1px solid transparent; /* no visible borders as requested */
      border-radius: 22px;
      background: rgba(255,255,255,.18);
      min-height: 74px;
      padding: 10px 10px 8px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      cursor:pointer;
      user-select:none;
      position:relative;
      overflow:hidden;
    }
    [data-theme="dark"] .cell{ background: rgba(255,255,255,.05); }
    .cell.out{ opacity:.45; cursor: default; }
    .cell .d{
      font-weight: 900;
      font-size: 18px;
      letter-spacing:-0.01em;
    }
    .cell .meta{
      display:flex;
      flex-direction:column;  /* KEY: vertical so it never overflows */
      align-items:flex-start;
      gap: 4px;
      min-height: 28px;
    }
    .cell .meta .ico{
      font-size: 15px;
      line-height: 1;
    }
    .cell .meta .val{
      font-weight: 900;
      font-size: 14px;
      line-height: 1.05;
      letter-spacing:-0.01em;
      color: var(--ink);
      opacity: .92;
      white-space: nowrap;
    }
    .cell.empty .meta .val{
      color: var(--muted2);
      font-weight: 900;
      opacity: .75;
    }

    .cell.plan{ background: var(--planFill); }
    .cell.done{ background: var(--doneFill); }
    .cell.extra{ background: var(--extraFill); }
    .cell.rest{ background: var(--restFill); }

    .calHint{
      margin: 12px 2px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
    }

    /* Wallet */
    .walletTotal{
      font-size: 40px;
      font-weight: 950;
      letter-spacing:-0.03em;
      margin: 0;
    }
    .goalCard{
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 22px;
      padding: 14px;
      box-shadow: var(--shadow2);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      margin-top: 12px;
    }
    .goalLeft{
      min-width: 0;
    }
    .goalTitle{
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing:-0.01em;
      display:flex;
      align-items:center;
      gap: 10px;
    }
    .goalMeta{
      margin: 6px 0 0;
      color: var(--muted);
      font-weight: 800;
      font-size: 14px;
    }
    .pct{
      width: 56px;
      height: 56px;
      border-radius: 999px;
      border: 1px solid var(--border);
      display:grid;
      place-items:center;
      font-weight: 900;
      background: rgba(255,255,255,.06);
      box-shadow: var(--shadow2);
      flex: 0 0 auto;
    }
    .bar{
      height: 10px;
      background: rgba(15,23,42,.08);
      border-radius: 999px;
      overflow:hidden;
      margin-top: 10px;
      border: 1px solid var(--border);
    }
    [data-theme="dark"] .bar{ background: rgba(255,255,255,.08); }
    .bar > div{
      height: 100%;
      background: rgba(165,22,58,.90);
      width: 0%;
      border-radius: 999px;
      transition: width 220ms ease;
    }

    /* Settings sections */
    .subCard{
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 22px;
      padding: 14px;
      box-shadow: var(--shadow2);
      margin-top: 12px;
    }
    .subCard h3{
      margin: 2px 0 4px;
      font-size: 18px;
      font-weight: 950;
      letter-spacing:-0.01em;
    }
    .subCard p{
      margin: 0 0 12px;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.45;
      font-size: 14px;
    }
    .fieldRow{
      display:grid;
      grid-template-columns: 1fr 110px;
      gap: 10px;
      margin-top: 10px;
      align-items:center;
    }
    input, select, textarea{
      width: 100%;
      padding: 12px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.45);
      color: var(--ink);
      font-weight: 800;
      font-size: 15px;
      outline: none;
    }
    textarea{ min-height: 92px; resize: vertical; font-weight: 700; }
    [data-theme="dark"] input,
    [data-theme="dark"] select,
    [data-theme="dark"] textarea{
      background: rgba(255,255,255,.08);
    }
    .saveBtn{
      padding: 12px 10px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.25);
      color: var(--ink);
      font-weight: 950;
      cursor:pointer;
      box-shadow: var(--shadow2);
    }
    .saveBtn:active{ transform: translateY(1px); }

    /* Modal */
    .modalBack{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.32);
      display:none;
      align-items:flex-end;
      justify-content:center;
      padding: 14px;
      z-index: 50;
    }
    [data-theme="dark"] .modalBack{ background: rgba(0,0,0,.55); }
    .modal{
      width: min(720px, 100%);
      border-radius: 26px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .modalHead{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .modalTitle{
      margin: 0;
      font-weight: 950;
      letter-spacing:-0.02em;
      font-size: 18px;
    }
    .modalSub{
      margin: 4px 0 0;
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
    }
    .modalClose{
      width: 42px;
      height: 42px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card);
      cursor:pointer;
      box-shadow: var(--shadow2);
      color: var(--ink);
      font-weight: 950;
      font-size: 18px;
    }
    .modalBody{
      padding: 14px;
    }
    .pillTag{
      display:inline-flex;
      gap: 8px;
      align-items:center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      font-weight: 900;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .help{
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
      margin: 10px 2px 0;
    }

    .twoCol{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 520px){
      .twoCol{ grid-template-columns: 1fr; }
      .tab{ min-width: 120px; }
      .todayDate{ font-size: 36px; }
      .activityTitle{ font-size: 38px; }
      .calTitle{ font-size: 30px; }
    }

    /* Tiny toast */
    .toast{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 18px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
      font-weight: 900;
      color: var(--ink);
      display:none;
      z-index: 60;
      max-width: 92vw;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="topbar">
      <div class="brand">
        <h1>point<span class="dot">.</span></h1>
        <p>Tapni deň → detaily. Plánovaný → hotovo (+príspevok). Neplánovaný → extra (0€).</p>
      </div>
      <div class="tools">
        <button class="iconBtn" id="themeBtn" title="Téma">🌓</button>
      </div>
    </div>

    <div class="tabs" role="tablist" aria-label="Navigácia">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="calendar">Kalendár</button>
      <button class="tab" data-tab="wallet">Peňaženka</button>
      <button class="tab" data-tab="settings">Nastavenia</button>
    </div>

    <div class="panel" id="view"></div>
  </div>

  <!-- Modal -->
  <div class="modalBack" id="modalBack" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modalHead">
        <div>
          <p class="modalTitle" id="modalTitle">Deň</p>
          <p class="modalSub" id="modalSub">status</p>
        </div>
        <button class="modalClose" id="modalClose" aria-label="Zavrieť">×</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast">Uložené.</div>

  <script>
    /********************
     * Helpers / Dates
     ********************/
    const pad2 = (n)=> String(n).padStart(2,'0');
    const toISODate = (d)=> `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    const fromISODate = (s)=> {
      const [y,m,dd]=s.split('-').map(Number);
      return new Date(y, m-1, dd);
    };
    const isSameDay = (a,b)=> a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
    const startOfDay = (d)=> new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const isFuture = (dateISO)=> startOfDay(fromISODate(dateISO)) > startOfDay(new Date());
    const isPastOrToday = (dateISO)=> !isFuture(dateISO);

    const monthNameSK = (m)=> ([
      "január","február","marec","apríl","máj","jún",
      "júl","august","september","október","november","december"
    ])[m];

    const dayNameShort = (d)=> (["Ne","Po","Ut","St","Št","Pi","So"])[d];

    function mondayStart(date){
      const d = new Date(date);
      const day = d.getDay(); // 0..6, 0=Sun
      const diff = (day===0 ? -6 : 1-day);
      d.setDate(d.getDate()+diff);
      return startOfDay(d);
    }

    /********************
     * Icons / Sports
     ********************/
    const SPORTS = [
      { id:"run", label:"Beh", icon:"🏃‍♀️" },
      { id:"strength", label:"Strength", icon:"🏋️‍♀️" },
      { id:"swim", label:"Plávanie", icon:"🏊‍♀️" },
      { id:"bike", label:"Bicykel", icon:"🚴‍♀️" },
      { id:"ski", label:"Lyže", icon:"⛷️" },
      { id:"walk", label:"Chôdza", icon:"🚶‍♀️" },
      { id:"yoga", label:"Joga", icon:"🧘‍♀️" },
    ];
    const sportById = (id)=> SPORTS.find(s=>s.id===id) || {id, label:id, icon:"🏁"};

    /********************
     * Storage
     ********************/
    const KEY = "point_app_v3_single_per_day";
    function loadState(){
      const raw = localStorage.getItem(KEY);
      if(raw){
        try { return JSON.parse(raw); } catch(e){}
      }
      return defaultState();
    }
    function saveState(){
      localStorage.setItem(KEY, JSON.stringify(state));
    }

    function defaultState(){
      // minimal demo data
      const todayISO = toISODate(new Date());
      return {
        ui: {
          tab: "dashboard",
          theme: null, // null = system
          calYear: new Date().getFullYear(),
          calMonth: new Date().getMonth(), // 0..11
          lastTrophyKey: null
        },
        settings: {
          plannedContribution: 5,
          weeklyGoal: 5, // "počet dní s tréningom"
          weeklyBonus: 5,
          enableWeeklyTrophy: true
        },
        // Goals (wallet targets)
        goals: [
          { id:"g_watch", title:"Hodinky", icon:"⌚", target: 350, assignedSports:["run"] },
          { id:"g_ski", title:"Lyže", icon:"⛷️", target: 400, assignedSports:["bike","strength"] },
        ],
        // Wallet progress by goal id
        wallet: {
          g_watch: 20,
          g_ski: 5
        },
        // Templates (quick planning)
        templates: [
          { id:"t_easyz2", sport:"run", title:"easy z2", metricType:"distance", value: 5, note:"" }
        ],
        // Day logs: ONE training per day (planned OR extra), plus optional addon note (no points)
        days: {
          // Example: "2026-03-04": { planned:true, status:"done", sport:"strength", title:"zhyby počas dňa", metricType:"time", value:10, note:"", addon:"" }
        }
      };
    }

    let state = loadState();

    /********************
     * Theme
     ********************/
    const root = document.documentElement;
    function applyTheme(){
      // if ui.theme is null => follow system
      const systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      const t = (state.ui.theme === null) ? (systemDark ? "dark" : "light") : state.ui.theme;
      root.setAttribute("data-theme", t);
    }
    applyTheme();
    if(window.matchMedia){
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", ()=>{
        if(state.ui.theme===null) applyTheme();
      });
    }

    /********************
     * Toast
     ********************/
    let toastTimer = null;
    function toast(msg){
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.style.display = "block";
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=> el.style.display="none", 1600);
    }

    /********************
     * Business rules
     ********************/
    // One training per day enforced by model: state.days[dateISO] holds at most 1 record.
    // Future days: allow planning (planned=true, status="plan"), disallow marking done, disallow creating extra.
    // Past/today: allow marking planned as done, allow adding extra if day empty (planned=false,status="extraDone")

    function getDay(dateISO){
      return state.days[dateISO] || null;
    }
    function setDay(dateISO, obj){
      if(obj === null){
        delete state.days[dateISO];
      }else{
        state.days[dateISO] = obj;
      }
      saveState();
    }

    function dayStatus(day){
      // returns: "empty" | "plan" | "done" | "extra"
      if(!day) return "empty";
      if(day.status === "done") return "done";
      if(day.status === "extraDone") return "extra";
      return "plan";
    }

    function canComplete(dateISO, day){
      if(!day) return false;
      if(isFuture(dateISO)) return false;
      if(day.status === "done" || day.status === "extraDone") return false;
      return true;
    }

    function canAddExtra(dateISO, day){
      if(isFuture(dateISO)) return false;
      if(day) return false; // one per day
      return true;
    }

    function canPlan(dateISO, day){
      // You can plan on any day, but if a day already has training, planning means edit/replace
      return true;
    }

    /********************
     * Metrics
     ********************/
    function lastNDaysRange(n){
      const end = startOfDay(new Date());
      const start = new Date(end);
      start.setDate(start.getDate() - (n-1));
      return { start, end };
    }

    function within(d, start, end){
      const x = startOfDay(d).getTime();
      return x >= start.getTime() && x <= end.getTime();
    }

    function compute30d(){
      const {start, end} = lastNDaysRange(30);
      let plannedTotal = 0;
      let plannedDone = 0;
      let doneCount = 0;  // hotovo
      let extraCount = 0; // extra
      for(const [iso, day] of Object.entries(state.days)){
        const d = fromISODate(iso);
        if(!within(d,start,end)) continue;
        if(day.planned){
          plannedTotal++;
          if(day.status==="done") plannedDone++;
        }
        if(day.status==="done") doneCount++;
        if(day.status==="extraDone") extraCount++;
      }
      const consistencyPct = plannedTotal===0 ? 0 : Math.round((plannedDone/plannedTotal)*100);
      const totalActivity = doneCount + extraCount;
      return { plannedTotal, plannedDone, consistencyPct, doneCount, extraCount, totalActivity };
    }

    function computeWeek(){
      const base = mondayStart(new Date());
      const days = [];
      for(let i=0;i<7;i++){
        const d = new Date(base);
        d.setDate(d.getDate()+i);
        const iso = toISODate(d);
        days.push({ iso, date:d, day:getDay(iso) });
      }
      let planned = 0, plannedDone = 0;
      for(const item of days){
        if(item.day && item.day.planned){
          planned++;
          if(item.day.status==="done") plannedDone++;
        }
      }
      const goal = Math.max(0, Number(state.settings.weeklyGoal || 0));
      // This week's "Tréning X/Y" — show plannedDone/planned
      return { days, planned, plannedDone, goal };
    }

    /********************
     * UI Builders
     ********************/
    const view = document.getElementById("view");

    function setTab(tab){
      state.ui.tab = tab;
      saveState();
      document.querySelectorAll(".tab").forEach(b=>{
        b.classList.toggle("active", b.dataset.tab===tab);
      });
      render();
    }

    document.querySelectorAll(".tab").forEach(btn=>{
      btn.addEventListener("click", ()=> setTab(btn.dataset.tab));
    });

    document.getElementById("themeBtn").addEventListener("click", ()=>{
      // cycle: system(null) -> light -> dark -> system
      const t = state.ui.theme;
      if(t===null) state.ui.theme = "light";
      else if(t==="light") state.ui.theme = "dark";
      else state.ui.theme = null;
      saveState();
      applyTheme();
      toast(state.ui.theme===null ? "Téma: systém" : `Téma: ${state.ui.theme}`);
      render();
    });

    function fmtMetric(metricType, value){
      if(metricType==="distance") return `${value} km`;
      if(metricType==="time") return `${value} min`;
      return String(value ?? "");
    }

    function todayISO(){
      return toISODate(new Date());
    }
    function todayLabelSK(){
      const d = new Date();
      const dow = dayNameShort(d.getDay());
      return `${dow} • ${pad2(d.getDate())}.${pad2(d.getMonth()+1)}.${d.getFullYear()}`;
    }

    function smallMantraForDay(day){
      // keep it simple & consistent with your vibe
      if(day?.sport==="run") return "Dnes stačí konzistentnosť, nie heroizmus.";
      if(day?.sport==="strength") return "Sila rastie z malých opakovaní.";
      if(day?.sport==="swim") return "Plynulosť je sila. Dýchaj pokojne.";
      if(day?.sport==="bike") return "Krok za krokom. To sa ráta.";
      return "Konzistentnosť vyhráva.";
    }

    function onPointLine(){
      return "You're on point.";
    }

    function render(){
      applyTheme();
      if(state.ui.tab==="dashboard") renderDashboard();
      else if(state.ui.tab==="calendar") renderCalendar();
      else if(state.ui.tab==="wallet") renderWallet();
      else renderSettings();
    }

    /********************
     * Dashboard
     ********************/
    function renderDashboard(){
      const iso = todayISO();
      const day = getDay(iso);

      // For dashboard header chips: show sport + status + week progress
      const week = computeWeek();
      const weekChip = `Tréning: ${week.plannedDone}/${week.planned}`;

      // Activity of the day shown first (per your request),
      // then 30d stats below activity.
      const sport = day ? sportById(day.sport) : null;
      const status = dayStatus(day);

      const title = day?.title || "Dnes";
      const metric = day ? fmtMetric(day.metricType, day.value) : "";
      const statusLabel = (status==="done" ? "hotovo" : status==="plan" ? "plán" : status==="extra" ? "extra" : "—");

      const canDone = canComplete(iso, day);
      const canExtra = canAddExtra(iso, day);

      const stats30 = compute30d();

      // Trophy if week planned complete and enabled
      const trophyEnabled = !!state.settings.enableWeeklyTrophy;
      const weekComplete = (week.planned>0 && week.plannedDone===week.planned);
      const trophyKey = `${toISODate(week.days[0].date)}_${week.planned}_${week.plannedDone}`;
      let trophyHTML = "";
      if(trophyEnabled && weekComplete){
        // bounce once per week completion key
        const bounce = (state.ui.lastTrophyKey !== trophyKey);
        if(bounce){
          state.ui.lastTrophyKey = trophyKey;
          saveState();
        }
        trophyHTML = `
          <div class="trophy ${bounce ? "bounce":""}">
            <span class="cup">🏆</span>
            <span class="txt">Week complete. You're on point.</span>
          </div>
        `;
      }

      view.innerHTML = `
        <div class="card">
          <div class="todayHead">
            <div>
              <div class="todayLabel">TODAY</div>
              <h2 class="todayDate">${todayLabelSK()}</h2>
            </div>
            <button class="btn ghost" style="flex:0 0 auto; min-width: 120px" id="btnTodayDetails">Detaily</button>
          </div>

          <div class="todayMeta">
            <div class="chips">
              <span class="chip ${status==="done"?"done":status==="plan"?"plan":status==="extra"?"extra":"pill"}">
                <span>${sport ? sport.icon : "🗓️"}</span>
                <span>${sport ? sport.label : "Bez tréningu"}</span>
              </span>
              <span class="chip ${status==="done"?"done":status==="plan"?"plan":status==="extra"?"extra":"pill"}">${statusLabel}</span>
              <span class="chip pill">${weekChip}</span>
            </div>
          </div>

          ${trophyHTML}

          <div class="hr"></div>

          <div>
            <div class="activityTitle">${escapeHtml(title)}</div>
            <div class="activitySub">${metric ? escapeHtml(metric) : "—"}</div>
            <p class="mantra">${escapeHtml(smallMantraForDay(day))}</p>
            <p class="mantra" style="margin-top:6px">${escapeHtml(onPointLine())}</p>
          </div>

          <div class="stats">
            <div class="stat">
              <div>
                <p class="k">Konzistencia (30 dní)</p>
                <p class="v">${stats30.plannedDone}/${stats30.plannedTotal} naplánovaných tréningov</p>
              </div>
              <div class="right">
                <p class="big">${stats30.consistencyPct}%</p>
                <p class="small">&nbsp;</p>
              </div>
            </div>

            <div class="stat">
              <div>
                <p class="k">Aktivita (30 dní)</p>
                <p class="v">${stats30.doneCount} hotovo + ${stats30.extraCount} extra</p>
              </div>
              <div class="right">
                <p class="big">${stats30.totalActivity} tréningov</p>
                <p class="small">&nbsp;</p>
              </div>
            </div>
          </div>

          <div class="btnRow">
            <button class="btn primary" id="btnComplete" ${(!canDone ? "disabled": "")}>Splnené</button>
            <button class="btn" id="btnEditMove">${day ? "Upraviť / Presun" : "Pridať / Naplánovať"}</button>
            <button class="btn ghost" id="btnAddExtra" ${(!canExtra ? "disabled":"")}>Pridať extra (0€)</button>
          </div>

          <div class="help" style="margin-top:12px">
            1 tréning denne. Plánovanie je možné aj v budúcnosti, dokončenie iba dnes/spätne.
          </div>
        </div>

        <div class="card weekCard" style="margin-top:14px">
          ${renderWeekCard()}
        </div>
      `;

      document.getElementById("btnTodayDetails").onclick = ()=> openDayModal(iso);
      document.getElementById("btnEditMove").onclick = ()=> openPlanModal(iso, day);
      document.getElementById("btnAddExtra").onclick = ()=> openExtraModal(iso);
      document.getElementById("btnComplete").onclick = ()=> markDone(iso);
    }

    function renderWeekCard(){
      const week = computeWeek();
      const start = week.days[0].date;
      const end = week.days[6].date;
      const range = `${pad2(start.getDate())}.${pad2(start.getMonth()+1)}.${start.getFullYear()} → ${pad2(end.getDate())}.${pad2(end.getMonth()+1)}.${end.getFullYear()}`;

      const dots = week.days.map(({date, iso, day})=>{
        const s = dayStatus(day);
        const cls = s==="done" ? "done" : s==="plan" ? "plan" : s==="extra" ? "extra" : "rest";
        return `
          <div class="wd" title="${iso}">
            <div class="lbl">${dayNameShort(date.getDay())}</div>
            <div class="dot ${cls}"></div>
          </div>
        `;
      }).join("");

      return `
        <div class="weekHead">
          <div>
            <p class="weekTitle">Tento týždeň</p>
            <p class="weekRange">${range}</p>
          </div>
          <span class="chip pill small">Tréning: ${week.plannedDone}/${week.planned}</span>
        </div>

        <div class="weekDots">${dots}</div>

        <div class="legend">
          <div class="legendItem"><span class="legendSw plan"></span> plán</div>
          <div class="legendItem"><span class="legendSw done"></span> hotovo</div>
          <div class="legendItem"><span class="legendSw extra"></span> extra</div>
          <div class="legendItem"><span class="legendSw rest"></span> rest</div>
        </div>
      `;
    }

    function markDone(dateISO){
      const day = getDay(dateISO);
      if(!day) return;
      if(isFuture(dateISO)) return;

      if(day.status==="plan"){
        day.status = "done";
        setDay(dateISO, day);
        // route contribution to goals
        const amount = Number(state.settings.plannedContribution || 0);
        routeContribution(day.sport, amount);
        // weekly bonus if week completed
        maybeApplyWeeklyBonus();
        toast("Splnené ✅");
        render();
      }
    }

    function routeContribution(sportId, amount){
      if(!amount || amount<=0) return;
      // find goals that include this sport
      const eligible = state.goals.filter(g=> (g.assignedSports || []).includes(sportId));
      if(eligible.length===0) return;
      // split evenly
      const per = amount / eligible.length;
      for(const g of eligible){
        state.wallet[g.id] = Number(state.wallet[g.id] || 0) + per;
      }
      saveState();
    }

    function maybeApplyWeeklyBonus(){
      const week = computeWeek();
      if(!state.settings.enableWeeklyTrophy) return;
      if(week.planned===0) return;
      if(week.plannedDone !== week.planned) return;

      // Apply weekly bonus once per week based on Monday key
      const weekKey = "bonus_" + toISODate(week.days[0].date);
      state.wallet._bonuses = state.wallet._bonuses || {};
      if(state.wallet._bonuses[weekKey]) return;

      const bonus = Number(state.settings.weeklyBonus || 0);
      if(bonus>0){
        // bonus splits across all goals equally
        const goals = state.goals.slice();
        if(goals.length){
          const per = bonus / goals.length;
          for(const g of goals){
            state.wallet[g.id] = Number(state.wallet[g.id] || 0) + per;
          }
        }
      }
      state.wallet._bonuses[weekKey] = true;
      saveState();
      toast("Bonus pridaný ✨");
    }

    /********************
     * Calendar
     ********************/
    function renderCalendar(){
      const y = state.ui.calYear;
      const m = state.ui.calMonth;

      const first = new Date(y, m, 1);
      const startDow = first.getDay(); // 0=Sun
      const daysInMonth = new Date(y, m+1, 0).getDate();

      const pre = (startDow===0 ? 6 : startDow-1); // Monday-first
      const cells = [];

      // prev month fillers
      const prevDays = new Date(y, m, 0).getDate();
      for(let i=0;i<pre;i++){
        const d = prevDays - (pre-1-i);
        const dt = new Date(y, m-1, d);
        cells.push({ out:true, date: dt });
      }
      // month days
      for(let d=1; d<=daysInMonth; d++){
        cells.push({ out:false, date: new Date(y,m,d) });
      }
      // next month fillers to complete grid rows (min 5 rows, max 6)
      while(cells.length % 7 !== 0) cells.push({ out:true, date: new Date(y,m+1, cells.length - (pre+daysInMonth) + 1) });

      const title = `${monthNameSK(m)} ${y}`;

      view.innerHTML = `
        <div class="card">
          <div class="calHead">
            <p class="calTitle">${title}</p>
            <div class="calNav">
              <button class="calBtn" id="calPrev" aria-label="Predchádzajúci mesiac">‹</button>
              <button class="calBtn" id="calNext" aria-label="Ďalší mesiac">›</button>
            </div>
          </div>

          <div class="dow">
            <div>Po</div><div>Ut</div><div>St</div><div>Št</div><div>Pi</div><div>So</div><div>Ne</div>
          </div>

          <div class="grid" id="calGrid"></div>

          <p class="calHint">
            Tapni deň → otvorí detaily. Plánovanie je možné aj v budúcnosti, dokončenie iba dnes/spätne.
          </p>
        </div>
      `;

      const grid = document.getElementById("calGrid");

      for(const c of cells){
        const iso = toISODate(c.date);
        const day = getDay(iso);
        const s = dayStatus(day);

        const sport = day ? sportById(day.sport) : null;

        let cls = "cell " + (c.out ? "out " : "");
        cls += (s==="done" ? "done" : s==="plan" ? "plan" : s==="extra" ? "extra" : "empty");

        const valText = day ? fmtMetric(day.metricType, day.value) : "—";

        const el = document.createElement("div");
        el.className = cls;
        el.innerHTML = `
          <div class="d">${pad2(c.date.getDate())}</div>
          <div class="meta">
            <div class="ico">${sport ? sport.icon : ""}</div>
            <div class="val">${day ? escapeHtml(valText) : "—"}</div>
          </div>
        `;

        if(!c.out){
          el.addEventListener("click", ()=> openDayModal(iso));
        } else {
          el.classList.add("out");
        }

        grid.appendChild(el);
      }

      document.getElementById("calPrev").onclick = ()=>{
        const d = new Date(state.ui.calYear, state.ui.calMonth-1, 1);
        state.ui.calYear = d.getFullYear();
        state.ui.calMonth = d.getMonth();
        saveState();
        render();
      };
      document.getElementById("calNext").onclick = ()=>{
        const d = new Date(state.ui.calYear, state.ui.calMonth+1, 1);
        state.ui.calYear = d.getFullYear();
        state.ui.calMonth = d.getMonth();
        saveState();
        render();
      };
    }

    /********************
     * Wallet
     ********************/
    function renderWallet(){
      // total is sum of goal balances (ignore metadata keys)
      const total = state.goals.reduce((sum,g)=> sum + Number(state.wallet[g.id] || 0), 0);

      view.innerHTML = `
        <div class="card">
          <div class="row" style="align-items:flex-end">
            <div>
              <div class="sectionTitle">Peňaženka</div>
              <div class="sectionSub">Príspevky sa rozdeľujú do cieľov podľa športu.</div>
            </div>
            <p class="walletTotal">${formatEuro(total)}</p>
          </div>

          <div id="goals"></div>
        </div>
      `;

      const host = document.getElementById("goals");
      for(const g of state.goals){
        const val = Number(state.wallet[g.id] || 0);
        const pct = g.target<=0 ? 0 : Math.min(100, Math.round((val/g.target)*100));
        const sportsLbl = (g.assignedSports||[]).map(s=>sportById(s).label).join(", ");

        const card = document.createElement("div");
        card.className = "goalCard";
        card.innerHTML = `
          <div class="goalLeft">
            <p class="goalTitle"><span>${g.icon || "🎯"}</span> <span>${escapeHtml(g.title)}</span></p>
            <p class="goalMeta">${formatEuro(val)} / ${formatEuro(g.target)} • ${escapeHtml(sportsLbl || "—")}</p>
            <div class="bar"><div style="width:${pct}%"></div></div>
          </div>
          <div class="pct">${pct}%</div>

    /********************
     * Modal: Day details / Plan / Extra
     ********************/
    const modalBack = document.getElementById("modalBack");
    const modalBody = document.getElementById("modalBody");
    const modalTitle = document.getElementById("modalTitle");
    const modalSub = document.getElementById("modalSub");
    document.getElementById("modalClose").onclick = closeModal;
    modalBack.addEventListener("click", (e)=>{ if(e.target===modalBack) closeModal(); });

    function openModal(title, sub, innerHTML){
      modalTitle.textContent = title;
      modalSub.textContent = sub;
      modalBody.innerHTML = innerHTML;
      modalBack.style.display = "flex";
      modalBack.setAttribute("aria-hidden","false");
    }
    function closeModal(){
      modalBack.style.display = "none";
      modalBack.setAttribute("aria-hidden","true");
      modalBody.innerHTML = "";
    }

    function openDayModal(dateISO){
      const d = fromISODate(dateISO);
      const dow = dayNameShort(d.getDay());
      const title = `${dow} • ${pad2(d.getDate())}.${pad2(d.getMonth()+1)}.${d.getFullYear()}`;

      const day = getDay(dateISO);
      const s = dayStatus(day);
      const statusLabel = (s==="done" ? "hotovo" : s==="plan" ? "plán" : s==="extra" ? "extra" : "bez tréningu");

      const future = isFuture(dateISO);

      const sport = day ? sportById(day.sport) : null;

      const canDone = canComplete(dateISO, day);
      const canExtra = canAddExtra(dateISO, day);

      const body = `
        <span class="pillTag">${day?.planned ? "plánovaný tréning" : (day ? "neplánovaný tréning" : "—")}</span>

        <div class="twoCol">
          <div>
            <label style="font-weight:900; color:var(--muted); font-size:13px">Šport</label>
            <div class="chip pill" style="margin-top:8px">${sport ? `${sport.icon} ${sport.label}` : "—"}</div>
          </div>
          <div>
            <label style="font-weight:900; color:var(--muted); font-size:13px">Status</label>
            <div class="chip ${s==="done"?"done":s==="plan"?"plan":s==="extra"?"extra":"pill"}" style="margin-top:8px">${statusLabel}</div>
          </div>
        </div>

        <div style="margin-top:12px">
          <label style="font-weight:900; color:var(--muted); font-size:13px">Aktivita dňa</label>
          <div class="card" style="margin-top:8px; padding:14px; border-radius:22px">
            <div style="display:flex; justify-content:space-between; gap:12px; align-items:flex-start">
              <div style="min-width:0">
                <div style="font-weight:950; font-size:18px; letter-spacing:-0.01em">${escapeHtml(day?.title || "—")}</div>
                <div style="margin-top:6px; color:var(--muted); font-weight:800">${day ? escapeHtml(fmtMetric(day.metricType, day.value)) : "—"}</div>
              </div>
              <div class="chip pill small" style="flex:0 0 auto">${future ? "budúcnosť" : "dnes/spätne"}</div>
            </div>
            ${day?.note ? `<div class="help" style="margin-top:10px">${escapeHtml(day.note)}</div>` : ""}
            ${day?.addon ? `<div class="help" style="margin-top:10px"><b>Doplnok (bez bodov):</b> ${escapeHtml(day.addon)}</div>` : ""}
          </div>
        </div>

        <div class="btnRow" style="margin-top:12px">
          <button class="btn primary" id="mDone" ${(!canDone ? "disabled":"")}>Splnené</button>
          <button class="btn" id="mEdit">${day ? "Upraviť / Presun" : "Pridať / Naplánovať"}</button>
          <button class="btn ghost" id="mExtra" ${(!canExtra ? "disabled":"")}>Pridať extra (0€)</button>
        </div>

        <div class="help" style="margin-top:12px">
          V budúcnosti vieš iba plánovať. Extra a „Splnené“ sú dostupné iba dnes alebo spätne.
        </div>
      `;

      openModal(title, `status: ${statusLabel}`, body);

      const mDone = document.getElementById("mDone");
      const mEdit = document.getElementById("mEdit");
      const mExtra = document.getElementById("mExtra");
      if(mDone) mDone.onclick = ()=>{ markDone(dateISO); closeModal(); };
      if(mEdit) mEdit.onclick = ()=>{ closeModal(); openPlanModal(dateISO, day); };
      if(mExtra) mExtra.onclick = ()=>{ closeModal(); openExtraModal(dateISO); };
    }

    function openPlanModal(dateISO, existing){
      const d = fromISODate(dateISO);
      const dow = dayNameShort(d.getDay());
      const title = `${dow} • ${pad2(d.getDate())}.${pad2(d.getMonth()+1)}.${d.getFullYear()}`;
      const isF = isFuture(dateISO);

      const plan = existing ? {...existing} : {
        planned: true,
        status: "plan",
        sport: "strength",
        title: "",
        metricType: "time",
        value: 10,
        note: "",
        addon: ""
      };
      plan.planned = true;
      if(plan.status!=="done" && plan.status!=="extraDone") plan.status = "plan";

      const tplOptions = state.templates.map(t=> `<option value="${t.id}">${escapeHtml(t.title)} (${sportById(t.sport).label})</option>`).join("");

      const sportOptions = SPORTS.map(s=> `<option value="${s.id}" ${s.id===plan.sport?"selected":""}>${s.icon} ${s.label}</option>`).join("");

      const body = `
        <span class="pillTag">plánovaný tréning</span>

        <div class="twoCol">
          <div>
            <label style="font-weight:900; color:var(--muted); font-size:13px">Template</label>
            <select id="pTpl" style="margin-top:8px">
              <option value="">— bez template —</option>
              ${tplOptions}
            </select>
          </div>
          <div>
            <label style="font-weight:900; color:var(--muted); font-size:13px">Šport</label>
            <select id="pSport" style="margin-top:8px">
              ${sportOptions}
            </select>
          </div>
        </div>

        <div class="twoCol" style="margin-top:10px">
          <div>
            <label style="font-weight:900; color:var(--muted); font-size:13px">Typ cieľa</label>
            <select id="pMetric" style="margin-top:8px">
              <option value="distance" ${plan.metricType==="distance"?"selected":""}>Vzdialenosť (km)</option>
              <option value="time" ${plan.metricType==="time"?"selected":""}>Čas (min)</option>
            </select>
          </div>
          <div>
            <label style="font-weight:900; color:var(--muted); font-size:13px">${plan.metricType==="distance"?"Kilometre":"Minúty"}</label>
            <input id="pValue" type="number" min="0" step="1" value="${Number(plan.value||0)}" style="margin-top:8px" />
          </div>
        </div>

        <div style="margin-top:10px">
          <label style="font-weight:900; color:var(--muted); font-size:13px">Názov</label>
          <input id="pTitle" value="${escapeAttr(plan.title || "")}" placeholder="napr. easy z2" style="margin-top:8px" />
        </div>

        <div style="margin-top:10px">
          <label style="font-weight:900; color:var(--muted); font-size:13px">Poznámka (voliteľné)</label>
          <textarea id="pNote" placeholder="cue, nálada, čokoľvek..." style="margin-top:8px">${escapeHtml(plan.note||"")}</textarea>
        </div>

        <div style="margin-top:10px">
          <label style="font-weight:900; color:var(--muted); font-size:13px">Doplnok (bez bodov)</label>
          <input id="pAddon" value="${escapeAttr(plan.addon || "")}" placeholder="napr. 15 min strečing (nepočíta sa)" style="margin-top:8px" />
          <div class="help">Doplnok sa nezapočíta do konzistencie ani príspevkov.</div>
        </div>

        <div style="margin-top:10px">
          <label style="font-weight:900; color:var(--muted); font-size:13px">Presunúť na</label>
          <input id="pMove" type="date" value="${dateISO}" style="margin-top:8px" />
        </div>

        <div class="btnRow" style="margin-top:12px">
          <button class="btn primary" id="pSave">Uložiť</button>
          <button class="btn" id="pMoveBtn">Presun</button>
          <button class="btn danger" id="pCancelPlan" ${(!existing ? "disabled":"")}>Zrušiť plán</button>
        </div>

        <div class="help">
          ${isF ? "Budúcnosť: môžeš plánovať, ale nie dokončiť." : "Dnes/spätne: môžeš plánovať aj dokončiť."}
          Ak už je v dni tréning, uložením ho prepíšeš (1 tréning denne).
        </div>
      `;

      openModal(title, "status: plán", body);

      const pTpl = document.getElementById("pTpl");
      const pSport = document.getElementById("pSport");
      const pMetric = document.getElementById("pMetric");
      const pValue = document.getElementById("pValue");
      const pTitle = document.getElementById("pTitle");
      const pNote = document.getElementById("pNote");
      const pAddon = document.getElementById("pAddon");
      const pMove = document.getElementById("pMove");

      function applyTemplate(tplId){
        const tpl = state.templates.find(t=>t.id===tplId);
        if(!tpl) return;
        pSport.value = tpl.sport;
        pMetric.value = tpl.metricType;
        pValue.value = tpl.value;
        pTitle.value = tpl.title;
        // keep note as user's
      }

      pTpl.onchange = ()=> applyTemplate(pTpl.value);

      pMetric.onchange = ()=>{
        // update label text only (small UX)
        // (lightweight: re-open modal would be too heavy; we keep it minimal)
      };

      document.getElementById("pSave").onclick = ()=>{
        const moveTo = pMove.value || dateISO;

        const obj = {
          planned: true,
          status: "plan",
          sport: pSport.value,
          title: (pTitle.value || "").trim() || (sportById(pSport.value).label),
          metricType: pMetric.value,
          value: Math.max(0, Number(pValue.value || 0)),
          note: (pNote.value || "").trim(),
          addon: (pAddon.value || "").trim()
        };

        // preserve done status if user edits an already done planned training (optional)
        // Here we keep it as plan because editing done retroactively can mess metrics.
        // If needed later, we can add a "ponechať hotovo" toggle.
        if(existing && existing.status==="done") obj.status = "done";

        // move logic: delete old date if changed
        if(moveTo !== dateISO){
          setDay(dateISO, null);
        }
        setDay(moveTo, obj);

        closeModal();
        toast("Uložené.");
        render();
      };

      document.getElementById("pMoveBtn").onclick = ()=>{
        const moveTo = pMove.value || dateISO;
        if(moveTo === dateISO) { toast("Nič sa nemení."); return; }
        const current = getDay(dateISO);
        if(!current){ toast("Nie je čo presúvať."); return; }
        // if target has data, confirm replace
        if(getDay(moveTo)){
          if(!confirm("Cieľový deň už má tréning. Prepísať?")) return;
        }
        setDay(moveTo, current);
        setDay(dateISO, null);
        closeModal();
        toast("Presunuté.");
        render();
      };

      document.getElementById("pCancelPlan").onclick = ()=>{
        if(!existing) return;
        if(confirm("Zrušiť tréning v tomto dni?")){
          setDay(dateISO, null);
          closeModal();
          toast("Zrušené.");
          render();
        }
      };
    }

              <option value="time">Čas (min)</option>
            </select>
          </div>

          </div>
          <div>
            <label style="font-weight:900; color:var(--muted); font-size:13px">Hodnota</label>

          </div>
        </div>

        <div style="margin-top:10px">
          <label style="font-weight:900; color:var(--muted); font-size:13px">Poznámka (voliteľné)</label>
          <textarea id="xNote" placeholder="čo to bolo, ako si sa cítila..." style="margin-top:8px"></textarea>
        </div>

        <div class="btnRow" style="margin-top:12px">

        <div class="help">Extra sa započíta do aktivity, ale nie do konzistencie ani príspevkov.</div>
      `;

      openModal(title, "status: extra", body);

      document.getElementById("xCancel").onclick = closeModal;
      document.getElementById("xSave").onclick = ()=>{

        const note = (document.getElementById("xNote").value || "").trim();

        const obj = {
          planned: false,
          status: "extraDone",
          sport, title, metricType, value,

          addon: ""

    /********************
     * Goal / Template modals
     ********************/
    function openNewGoalModal(){
      openGoalModal(null);

    function openEditGoalModal(goalId){
      const g = state.goals.find(x=>x.id===goalId);

    function openGoalModal(goal){
      const isEdit = !!goal;
      const g = goal ? {...goal} : { id: "g_"+Math.random().toString(36).slice(2,8), title:"", icon:"🎯", target: 100, assignedSports:["run"] };

      const sportsChecks = SPORTS.map(s=>{

          <label style="display:flex; align-items:center; gap:10px; font-weight:900; margin-top:10px">
            <input type="checkbox" data-sportcheck="${s.id}" ${checked}/>
            <span>${s.icon} ${s.label}</span>
          </label>

      }).join("");

      const body = `
        <span class="pillTag">${isEdit ? "upraviť cieľ" : "nový cieľ"}</span>

        <div class="twoCol">
          <div>
            <label style="font-weight:900; color:var(--muted); font-size:13px">Názov</label>
            <input id="gTitle" value="${escapeAttr(g.title)}" placeholder="napr. Hodinky" style="margin-top:8px" />
          </div>

            <label style="font-weight:900; color:var(--muted); font-size:13px">Ikona</label>

          </div>
        </div>

        <div style="margin-top:10px">
          <label style="font-weight:900; color:var(--muted); font-size:13px">Cieľová suma (€)</label>
          <input id="gTarget" type="number" min="0" step="1" value="${Number(g.target||0)}" style="margin-top:8px" />
        </div>

        <div style="margin-top:12px">
          <label style="font-weight:950; letter-spacing:-0.01em">Priradené športy (routing príspevkov)</label>
          <div class="help">Ak splníš plánovaný tréning, príspevok sa rozdelí medzi ciele, ktoré obsahujú daný šport.</div>
          ${sportsChecks}
        </div>

        <div class="btnRow" style="margin-top:12px">
          <button class="btn primary" id="gSave">Uložiť</button>
          <button class="btn ghost" id="gCancel">Zrušiť</button>
          ${isEdit ? `<button class="btn danger" id="gDelete">Zmazať</button>` : ``}
        </div>
      `;

      openModal(isEdit ? "Upraviť cieľ" : "Nový cieľ", "ciele (odmeny)", body);

      document.getElementById("gCancel").onclick = closeModal;

      document.getElementById("gSave").onclick = ()=>{
        const title = (document.getElementById("gTitle").value || "").trim() || "Cieľ";
        const icon = (document.getElementById("gIcon").value || "🎯").trim();
        const target = Math.max(0, Number(document.getElementById("gTarget").value || 0));
        const assignedSports = Array.from(document.querySelectorAll("[data-sportcheck]"))
          .filter(x=>x.checked)
          .map(x=>x.dataset.sportcheck);

        const next = { ...g, title, icon, target, assignedSports };
        if(isEdit){
          state.goals = state.goals.map(x=> x.id===g.id ? next : x);
        }else{
          state.goals.push(next);
          state.wallet[next.id] = Number(state.wallet[next.id] || 0);
        }
        saveState();
        closeModal();
        toast("Uložené.");
        render();
      };

      if(isEdit){
        document.getElementById("gDelete").onclick = ()=>{
          if(confirm("Zmazať cieľ? (zostane ti len peňaženka bez tohto cieľa)")){
            state.goals = state.goals.filter(x=>x.id!==g.id);
            delete state.wallet[g.id];
            saveState();
            closeModal();
            toast("Zmazané.");
            render();
          }
        };
      }
    }

    function openNewTemplateModal(){
      openTemplateModal(null);
    }
    function openEditTemplateModal(tplId){
      const t = state.templates.find(x=>x.id===tplId);
      if(!t) return;
      openTemplateModal(t);
    }

    function openTemplateModal(tpl){
      const isEdit = !!tpl;
      const t = tpl ? {...tpl} : { id:"t_"+Math.random().toString(36).slice(2,8), sport:"run", title:"", metricType:"distance", value:5, note:"" };

      const sportOptions = SPORTS.map(s=> `<option value="${s.id}" ${s.id===t.sport?"selected":""}>${s.icon} ${s.label}</option>`).join("");

      const body = `
        <span class="pillTag">${isEdit ? "upraviť template" : "nový template"}</span>

        <div class="twoCol">
          <div>
            <label style="font-weight:900; color:var(--muted); font-size:13px">Šport</label>
            <select id="tSport" style="margin-top:8px">${sportOptions}</select>
          </div>
          <div>
            <label style="font-weight:900; color:var(--muted); font-size:13px">Typ cieľa</label>
            <select id="tMetric" style="margin-top:8px">
              <option value="distance" ${t.metricType==="distance"?"selected":""}>Vzdialenosť (km)</option>
              <option value="time" ${t.metricType==="time"?"selected":""}>Čas (min)</option>
            </select>
          </div>
        </div>

        <div class="twoCol" style="margin-top:10px">
          <div>
            <label style="font-weight:900; color:var(--muted); font-size:13px">Názov</label>
            <input id="tTitle" value="${escapeAttr(t.title)}" placeholder="napr. easy z2" style="margin-top:8px" />
          </div>
          <div>
            <label style="font-weight:900; color:var(--muted); font-size:13px">Hodnota</label>
            <input id="tValue" type="number" min="0" step="1" value="${Number(t.value||0)}" style="margin-top:8px" />
          </div>
        </div>

        <div style="margin-top:10px">
          <label style="font-weight:900; color:var(--muted); font-size:13px">Poznámka (voliteľné)</label>
          <textarea id="tNote" placeholder="čo tento template znamená..." style="margin-top:8px">${escapeHtml(t.note||"")}</textarea>
        </div>

        <div class="btnRow" style="margin-top:12px">
          <button class="btn primary" id="tSave">Uložiť</button>
          <button class="btn ghost" id="tCancel">Zrušiť</button>
        </div>
      `;

      openModal(isEdit ? "Upraviť template" : "Nový template", "templaty tréningov", body);

      document.getElementById("tCancel").onclick = closeModal;
      document.getElementById("tSave").onclick = ()=>{
        const sport = document.getElementById("tSport").value;
        const metricType = document.getElementById("tMetric").value;
        const title = (document.getElementById("tTitle").value || "").trim() || "template";
        const value = Math.max(0, Number(document.getElementById("tValue").value || 0));
        const note = (document.getElementById("tNote").value || "").trim();

        const next = { ...t, sport, metricType, title, value, note };
        if(isEdit){
          state.templates = state.templates.map(x=> x.id===t.id ? next : x);
        }else{
          state.templates.push(next);
        }
        saveState();
        closeModal();
        toast("Uložené.");
        render();
      };
    }

    /********************
     * Utils
     ********************/
    function formatEuro(n){
      const v = Math.round((Number(n||0) + Number.EPSILON) * 100) / 100;
      // show no decimals if .00
      const s = (Math.abs(v - Math.round(v)) < 0.0001) ? String(Math.round(v)) : v.toFixed(2);
      return `${s}€`;
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function escapeAttr(str){
      return escapeHtml(str).replaceAll('"',"&quot;");
    }

    /********************
     * Initial boot
     ********************/
    // Ensure calendar month shows current month unless user had something else
    (function init(){
      applyTheme();
      // if state.ui.calMonth is not set properly, fix
      if(typeof state.ui.calMonth !== "number" || typeof state.ui.calYear !== "number"){
        state.ui.calYear = new Date().getFullYear();
        state.ui.calMonth = new Date().getMonth();
        saveState();
      }
      // Restore active tab
      document.querySelectorAll(".tab").forEach(b=>{
        b.classList.toggle("active", b.dataset.tab===state.ui.tab);
      });
      render();
    })();
  </script>
</body>
</html>
